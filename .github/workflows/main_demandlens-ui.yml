name: Build and deploy React app to Azure Web App - demandlens-ui

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20.x'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build project
        env:
          VITE_API_BASE_URL: 'https://demandlens-api.azurewebsites.net/api'
        run: npm run build

      - name: Create PM2 config for Azure mapping
        run: |
          echo 'module.exports = { apps: [{ name: "frontend", script: "npx", args: "serve -s . -p 8080" }] };' > dist/ecosystem.config.js

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: react-build
          path: frontend/dist

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: react-build
          path: .

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'demandlens-ui'
          publish-profile: ${{ secrets.AZURE_FRONTEND_PUBLISH_PROFILE }}   # ✅ Update this to match the GitHub secret you created
          package: .
