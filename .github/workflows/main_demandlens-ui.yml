name: Build and deploy React app to Azure Web App - demandlens-ui

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build project
        env:
          VITE_API_BASE_URL: 'https://demandlens-api.azurewebsites.net/api'   # ✅ your backend URL
        run: npm run build

      - name: Create PM2 config (serve React)
        run: |
          echo 'module.exports = { apps: [{ name: "frontend", script: "npx", args: "serve -s . -p 8080" }] };' > dist/ecosystem.config.js

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: react-build
          path: frontend/dist

  deploy:
    runs-on: ubuntu-latest
    needs: build

    permissions:
      id-token: write      # ✅ CRITICAL FIX (your error fix)
      contents: read

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: react-build

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_45CBE0380E5446F7A8B89F272B3B4B17 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_D48C7EE403C243128DD18C720B8A11E2 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_BF55B2CAD9DF49E9BF77C4A9410993F6 }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'demandlens-ui'
          slot-name: 'Production'
          package: .
